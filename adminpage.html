<!DOCTYPE html>
<html>
  <head>
    <title>Hamanda EPPS | Account Info</title>
    <link rel="stylesheet" href="style.css">
    <!-- FIX 1: Corrected the full Supabase library link -->
    <script src="https://jsdelivr.net"></script>
  </head>
  <body>
    <header>
      <h1>Hamanda EPPS</h1>
      <h2>Check your account:</h2>
    </header>

    <!-- LOGIN PANEL -->
    <div id="login-panel">
      <h3>Log In</h3>
      <!-- Added an id to the form so JavaScript can listen to the submit event -->
      <form id="login-form">
        <!-- Google Auth only needs Email/Password; Username input removed here to prevent bugs -->
        <input id="loginEmail" type="email" placeholder="Email" required>
        <br><br>
        <input id="loginPassword" type="password" placeholder="Password" required>
        <br><br>
        <button type="submit">Log In</button>
      </form>
      <p id="login-error" style="color: red; display: none;"></p>
    </div>

    <!-- FIX 2: Added the missing Stats Panel HTML layout -->
    <div id="stats-panel" style="display: none;">
      <h3>Welcome Back, <span id="stat-username"></span>! 👋</h3>
      <p><strong>Email:</strong> <span id="stat-email"></span></p>
      <p><strong>Your Points:</strong> <span id="stat-points" style="font-size: 24px; font-weight: bold; color: #0070f3;">0</span></p>
      <br>
      <button id="logout-btn">Log Out</button>
    </div>

    <script>
      const SUPABASE_URL = "https://elffgisoupzisecavmvp.supabase.co"; 
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsZmZnaXNvdXB6aXNlY2F2bXZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Nzk2MjgsImV4cCI6MjA5NjQ1NTYyOH0.BJpE196GqOOgkBsOsvCVHx4bk64P8UjzS5oD4D0gV0k";
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // FIX 3: Check session on page load WITHOUT instantly kicking them out
      window.addEventListener('load', async () => {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
          fetchUserProfile(user);
        } else {
          // If no user is logged in, quietly show the login panel instead of crashing/redirecting
          document.getElementById('login-panel').style.display = 'block';
          document.getElementById('stats-panel').style.display = 'none';
        }
      });

      // FIX 4: Added the form action listener to actually execute the login
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorElement = document.getElementById('login-error');

        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password,
        });

        if (error) {
          errorElement.textContent = error.message;
          errorElement.style.display = 'block';
        } else {
          errorElement.style.display = 'none';
          fetchUserProfile(data.user);
        }
      });

      async function fetchUserProfile(user) {
        const { data, error } = await supabase
          .from('profiles')
          .select('username, points')
          .eq('id', user.id)
          .single();

        // Hide login, reveal the stats panel
        document.getElementById('login-panel').style.display = 'none';
        document.getElementById('stats-panel').style.display = 'block';

        // Update the display fields securely
        document.getElementById('stat-email').textContent = user.email;
        document.getElementById('stat-username').textContent = data ? data.username : "Valued Customer";
        document.getElementById('stat-points').textContent = data ? data.points : "0";
      }

      // FIX 5: Added functioning log out utility handler
      document.getElementById('logout-btn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        document.getElementById('stats-panel').style.display = 'none';
        document.getElementById('login-panel').style.display = 'block';
        document.getElementById('login-form').reset();
      });
    </script>
  </body>
</html>
