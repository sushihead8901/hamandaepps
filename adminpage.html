<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamanda EPPS | Account Stats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Hamanda Enterprise Printer Service</h1>
    <h2>Member Dashboard</h2>
  </header>

  <hr>

  <!-- User Account Information Box -->
  <div id="stats-panel" style="max-width: 450px; margin: 30px auto; padding: 20px; border: 4px solid #333; border-radius: 8px; font-family: sans-serif; background-color: #ffffff; box-shadow: 6px 6px 0px #333;">
    <h3 style="margin-top: 0;">Welcome Back, <span id="stat-username" style="color: #0070f3;">Loading...</span>! 👋</h3>
    
    <p><strong>Account Email:</strong> <span id="stat-email">Loading...</span></p>
    
    <!-- Visual Points Counter -->
    <div style="background-color: #f0f7ff; border: 2px solid #0070f3; padding: 20px; border-radius: 6px; text-align: center; margin-top: 20px;">
      <h4 style="margin: 0; color: #555; text-transform: uppercase; font-size: 13px; letter-spacing: 1px;">Your Club Balance</h4>
      <p id="stat-points" style="font-size: 42px; font-weight: bold; margin: 10px 0 0 0; color: #0070f3;">0</p>
      <small style="color: #666; display: block; margin-top: 8px;">Earn 10 points for every page you print with us!</small>
    </div>
    
    <br>
    
    <!-- Link to go back to the storefront -->
    <button onclick="window.location.href='/index.html'" style="width: 100%; padding: 12px; background-color: #333; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 15px;">
      ← Return to Main Shop
    </button>
  </div>

  <hr>

  <footer>
    <p>Copyright Hamanda EPPS 2026</p>
  </footer>

  <script>
    // This script instantly pulls parameters straight from the browser URL address bar
    window.addEventListener('load', () => {
      const urlParams = new URLSearchParams(window.location.search);
      
      // Grab data passed from index.html, or use default backups if empty
      const username = urlParams.get('username') || "Valued Customer";
      const email = urlParams.get('email') || "No email provided";
      const points = urlParams.get('points') || "0";

      // Put the text data onto the screen elements safely
      document.getElementById('stat-username').textContent = username;
      document.getElementById('stat-email').textContent = email;
      document.getElementById('stat-points').textContent = points;
    });
  </script>

</body>
</html>
