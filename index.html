<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamanda EPPS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Hamanda Enterprise Printer Service</h1>
  <h3>Fast Printing, Cheap Prints</h3>
  <h4 id="status">Welcome, Guest</h4>
</header>

<hr>

<div>
  <p>We print documents fast and cheap for YOU!</p>
</div>

<hr>

<h2>Sign Up</h2>

<form id="signupForm">
  <input id="signupUsername" placeholder="Username" required minlength="3">
  <br><br>
  <input id="signupEmail" type="email" placeholder="Email" required>
  <br><br>
  <input id="signupPassword" type="password" placeholder="Password" required minlength="6">
  <br><br>
  <button type="submit">Create Account</button>
</form>

<hr>

<h2>Log In</h2>

<form id="loginForm">
  <input id="loginEmail" type="email" placeholder="Email" required>
  <br><br>
  <input id="loginPassword" type="password" placeholder="Password" required>
  <br><br>
  <button type="submit">Log In</button>
</form>

<br>

<button id="logoutBtn">Log Out</button>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://elffgisoupzisecavmvp.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsZmZnaXNvdXB6aXNlY2F2bXZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Nzk2MjgsImV4cCI6MjA5NjQ1NTYyOH0.BJpE196GqOOgkBsOsvCVHx4bk64P8UjzS5oD4D0gV0k'
const supabase = createClient(supabaseUrl, supabaseKey)

const status = document.getElementById("status")

// ---------------- LOAD USER ----------------
async function loadUser() {
  const { data: { user } } = await supabase.auth.getUser()

  if (!user) {
    status.textContent = "Welcome, Guest"
    return
  }

  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single()

  status.textContent = `Welcome, ${data?.username || "User"}`
}

loadUser()

// ---------------- SIGN UP ----------------
document.getElementById("signupForm").addEventListener("submit", async (e) => {
  e.preventDefault()

  const username = document.getElementById("signupUsername").value
  const email = document.getElementById("signupEmail").value
  const password = document.getElementById("signupPassword").value

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: {
        username: username
      }
    }
  })

  if (error) {
    alert(error.message)
    return
  }

  alert("Account created! (Check profiles table for 50 points)")
  e.target.reset()

  loadUser()
})

// ---------------- LOGIN ----------------
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault()

  const email = document.getElementById("loginEmail").value
  const password = document.getElementById("loginPassword").value

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  })

  if (error) {
    alert(error.message)
    return
  }

  loadUser()
  alert("Logged in!")
  e.target.reset()
})

// ---------------- LOGOUT ----------------
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await supabase.auth.signOut()
  status.textContent = "Welcome, Guest"
})
</script>

</body>
</html>
